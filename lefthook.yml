pre-commit:
  jobs:
    - name: protect-main
      priority: 0
      run: test "$(git branch --show-current)" != "main"
      fail_text: main is protected — create a branch (one job = one worktree/branch + PR)
    - name: gitleaks
      priority: 0
      run: mise install -q && mise exec -- gitleaks git --staged --redact --no-banner
    - name: lint
      priority: 1
      glob: '*.{ts,tsx,js,jsx,mjs,cjs}'
      run: ./node_modules/.bin/oxlint --fix --deny-warnings --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    - name: boundaries
      priority: 1
      run: pnpm run lint:boundaries
    - name: fsd
      priority: 1
      run: pnpm run lint:fsd
    - name: dead
      priority: 1
      run: pnpm run lint:dead
    - name: dup
      priority: 1
      run: pnpm run lint:dup
    - name: spell
      priority: 1
      run: pnpm run lint:spell
    - name: prose
      priority: 1
      glob: '*.md'
      run: mise install -q && (test .vale/styles/Microsoft -nt .vale.ini || mise exec -- vale sync) && pnpm run lint:prose
    - name: fmt
      priority: 2
      glob: '*.{ts,tsx,js,jsx,mjs,cjs,json,md,yaml,yml,html,css}'
      run: ./node_modules/.bin/oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    - name: typecheck
      priority: 3
      run: pnpm run typecheck

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
