name: ruleset-bypass-audit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bypasses=$(gh api "repos/${{ github.repository }}/rulesets/rule-suites?rule_suite_result=bypass&time_period=week" --paginate)
          count=$(echo "$bypasses" | jq 'length')
          if [ "$count" -gt 0 ]; then
            body=$(echo "$bypasses" | jq -r '.[] | "- \(.actor_name // "unknown") bypassed `\(.ref)` at \(.pushed_at)"')
            gh issue create --title "Ruleset bypasses this week" --body "$body"
          fi
